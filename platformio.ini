; PlatformIO Project Configuration File
;
; Air-quality monitor firmware (ESP32 + PMS5003 + DHT22 + I2C LCD).
; Docs: https://docs.platformio.org/page/projectconf.html

[env:esp32doit-devkit-v1]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino

; Serial monitor — matches Serial.begin(9600) in src/main.cpp
monitor_speed = 9600

; BLE (Bluedroid) + WiFi + TLS overflow the default 1.3 MB app partition,
; so use the single-app 3 MB layout. No OTA, which we don't use here.
board_build.partitions = huge_app.csv

; Logging verbosity for the Arduino-ESP32 log_e/log_w/log_i/log_d/log_v macros.
; 0=None 1=Error 2=Warn 3=Info 4=Debug 5=Verbose. Anything above this level is
; stripped at compile time (zero flash/RAM/CPU). Drop to 1 for a release build.
build_flags = -DCORE_DEBUG_LEVEL=4

lib_deps =
    avaldebe/PMserial
    adafruit/DHT sensor library
    adafruit/Adafruit Unified Sensor
    marcoschwartz/LiquidCrystal_I2C
    bblanchon/ArduinoJson
