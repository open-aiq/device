name: format

# Strictly enforces formatting/style: fails the build if any file isn't
# formatted. Runs the same pre-commit hooks developers run locally, so CI is
# the authoritative gate (local hooks can be skipped with --no-verify; this
# cannot).
on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - uses: pre-commit/action@v3.0.1
